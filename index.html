<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneka Karpet Indah - Katalog Resmi</title>

    <!-- PERF: Preconnect ke domain eksternal supaya koneksi lebih cepat -->
    <link rel="preconnect" href="https://cdn.tailwindcss.com">
    <link rel="preconnect" href="https://docs.google.com">
    <link rel="preconnect" href="https://i.ibb.co.com">

    <!-- PERF: Preload logo karena ini LCP element -->
    <link rel="preload" as="image" href="https://i.ibb.co.com/Gv2LpsVy/Aneka-Karpet-Indah-logo-page-0001.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>

    <style>
        /* PERF: Hanya animate opacity, hindari layout thrashing */
        .filter-btn.active { background-color: #3b82f6; color: white; border-color: #3b82f6; }
        .ukuran-btn.selected { background-color: #3b82f6; color: white; border-color: #3b82f6; box-shadow: 0 2px 4px rgba(59,130,246,0.3); }

        #modal-zoom { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; cursor: zoom-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* PERF: Gunakan will-change hanya pada elemen yang akan dianimasikan */
        .lazy-img { opacity: 0; transition: opacity 0.3s ease; will-change: opacity; }
        .lazy-img.loaded { opacity: 1; will-change: auto; }

        /* PERF: Skeleton loader untuk placeholder yang lebih ringan dari gambar */
        .skeleton {
            background: linear-gradient(90deg, #e5e7eb 25%, #f3f4f6 50%, #e5e7eb 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        .dark .skeleton {
            background: linear-gradient(90deg, #27272a 25%, #3f3f46 50%, #27272a 75%);
            background-size: 200% 100%;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* PERF: Batasi card animation agar tidak berlebihan */
        .card-item { contain: layout style; }
        .card-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); transform: translateY(-2px); transition: box-shadow 0.2s, transform 0.2s; }

        /* PERF: Paksa GPU layer hanya pada image container */
        .img-wrap { transform: translateZ(0); }
    </style>
</head>
<body class="bg-gray-100 dark:bg-zinc-900 min-h-screen pb-20 font-sans transition-colors duration-300 text-gray-800 dark:text-gray-200">

    <header class="bg-white dark:bg-zinc-800 shadow-md sticky top-0 z-50">
        <div class="p-4 flex flex-col gap-3">
            <div class="relative flex items-center justify-center min-h-[48px]">
                <!-- PERF: fetchpriority=high untuk LCP image -->
                <img src="https://i.ibb.co.com/Gv2LpsVy/Aneka-Karpet-Indah-logo-page-0001.jpg"
                     alt="Aneka Karpet Indah"
                     class="h-12 w-auto object-contain"
                     fetchpriority="high"
                     decoding="async"
                     style="opacity:1">

                <button onclick="toggleDarkMode()" aria-label="Toggle dark mode"
                        class="absolute right-0 p-2 rounded-xl bg-gray-100 dark:bg-zinc-700 text-gray-800 dark:text-yellow-400">
                    <svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
                    </svg>
                </button>
            </div>

            <!-- PERF: debounce pada search agar tidak re-render tiap keystroke -->
            <div class="relative">
                <input type="search" id="search-input" placeholder="Cari merk atau motif..."
                       class="w-full pl-10 pr-4 py-2.5 rounded-2xl bg-gray-50 dark:bg-zinc-700 border-none focus:ring-2 focus:ring-blue-500 text-sm"
                       autocomplete="off" autocorrect="off" spellcheck="false">
                <svg class="w-4 h-4 absolute left-3.5 top-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>
        </div>
        <div id="filter-bar" class="flex gap-2 overflow-x-auto px-4 pb-4 no-scrollbar">
            <button class="filter-btn active whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 dark:border-zinc-700 text-xs font-bold bg-white dark:bg-zinc-800 uppercase">SEMUA</button>
        </div>
    </header>

    <main class="p-3 max-w-5xl mx-auto">
        <!-- PERF: Skeleton awal ditampilkan sebelum data datang -->
        <div id="katalog-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <!-- Skeleton cards -->
            <div class="bg-white dark:bg-zinc-800 rounded-2xl overflow-hidden shadow-sm border border-gray-100 dark:border-zinc-700 flex flex-col">
                <div class="aspect-[3/4] skeleton"></div>
                <div class="p-3 flex flex-col gap-2">
                    <div class="h-2 w-16 skeleton rounded"></div>
                    <div class="h-3 w-full skeleton rounded"></div>
                    <div class="h-3 w-3/4 skeleton rounded"></div>
                    <div class="h-4 w-24 skeleton rounded mt-2"></div>
                </div>
            </div>
            <div class="bg-white dark:bg-zinc-800 rounded-2xl overflow-hidden shadow-sm border border-gray-100 dark:border-zinc-700 flex flex-col">
                <div class="aspect-[3/4] skeleton"></div>
                <div class="p-3 flex flex-col gap-2">
                    <div class="h-2 w-16 skeleton rounded"></div>
                    <div class="h-3 w-full skeleton rounded"></div>
                    <div class="h-3 w-3/4 skeleton rounded"></div>
                    <div class="h-4 w-24 skeleton rounded mt-2"></div>
                </div>
            </div>
            <div class="hidden md:flex bg-white dark:bg-zinc-800 rounded-2xl overflow-hidden shadow-sm border border-gray-100 dark:border-zinc-700 flex-col">
                <div class="aspect-[3/4] skeleton"></div>
                <div class="p-3 flex flex-col gap-2">
                    <div class="h-2 w-16 skeleton rounded"></div>
                    <div class="h-3 w-full skeleton rounded"></div>
                    <div class="h-3 w-3/4 skeleton rounded"></div>
                    <div class="h-4 w-24 skeleton rounded mt-2"></div>
                </div>
            </div>
            <div class="hidden lg:flex bg-white dark:bg-zinc-800 rounded-2xl overflow-hidden shadow-sm border border-gray-100 dark:border-zinc-700 flex-col">
                <div class="aspect-[3/4] skeleton"></div>
                <div class="p-3 flex flex-col gap-2">
                    <div class="h-2 w-16 skeleton rounded"></div>
                    <div class="h-3 w-full skeleton rounded"></div>
                    <div class="h-3 w-3/4 skeleton rounded"></div>
                    <div class="h-4 w-24 skeleton rounded mt-2"></div>
                </div>
            </div>
        </div>

        <!-- Status teks -->
        <p id="status-text" class="text-center text-gray-400 text-xs mt-4 hidden"></p>
    </main>

    <!-- Modal zoom -->
    <div id="modal-zoom" onclick="closeZoom()" role="dialog" aria-modal="true" aria-label="Zoom gambar">
        <img id="img-zoom" class="w-full h-full object-contain p-4" style="opacity:1" src="" alt="Zoom produk" loading="lazy" decoding="async">
    </div>

    <!-- PERF: WhatsApp icon di-inline sebagai SVG, hapus request gambar eksternal -->
    <svg id="wa-svg-src" style="display:none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
        <path fill="#25D366" d="M4.9 43.3l2.7-9.9C5.9 30.6 5 27.4 5 24 5 13.5 13.5 5 24 5s19 8.5 19 19-8.5 19-19 19c-3.2 0-6.2-.8-8.8-2.3L4.9 43.3z"/>
        <path fill="#fff" d="M33.7 28.3c-.4-.2-2.3-1.1-2.6-1.3-.3-.1-.6-.2-.9.2-.3.4-1 1.3-1.3 1.5-.2.3-.5.3-.9.1-.4-.2-1.7-.6-3.2-2-1.2-1-2-2.3-2.2-2.7-.2-.4 0-.6.2-.8.2-.2.4-.5.6-.7.2-.2.2-.4.3-.7.1-.2 0-.5-.1-.7-.1-.2-1-2.3-1.3-3.1-.3-.8-.7-.7-1-.7h-.8c-.3 0-.7.1-1 .5s-1.4 1.4-1.4 3.3 1.4 3.8 1.6 4.1c.2.3 2.8 4.3 6.8 6 .9.4 1.7.6 2.2.8.9.3 1.8.2 2.4.1.7-.1 2.3-.9 2.6-1.8.3-.9.3-1.6.2-1.8-.1-.2-.4-.3-.8-.5z"/>
    </svg>

    <script>
        const SHEET_ID = '1iLJWtfJntcjZalA7q-FFIUNe8BXGT40za7kMeELXfJk';
        const WA_NUMBER = '628XXXXXXXXXX'; // GANTI NOMOR WHATSAPP ANDA
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        // PERF: Cache data di sessionStorage supaya reload tab tidak fetch ulang
        const CACHE_KEY = 'aki_katalog_v1';
        const CACHE_TTL = 5 * 60 * 1000; // 5 menit

        let semuaProduk = [];
        let activeFilter = 'Semua';

        // PERF: Satu IntersectionObserver global, bukan dibuat ulang tiap render
        let lazyObserver = null;

        function formatRupiah(angka) {
            return parseInt(angka).toLocaleString('id-ID');
        }

        // PERF: Debounce search agar tidak render tiap karakter
        function debounce(fn, delay) {
            let t;
            return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
        }

        document.getElementById('search-input').addEventListener('input', debounce(cariProduk, 250));

        async function ambilData() {
            // Cek cache dulu
            try {
                const cached = sessionStorage.getItem(CACHE_KEY);
                if (cached) {
                    const { ts, data } = JSON.parse(cached);
                    if (Date.now() - ts < CACHE_TTL) {
                        semuaProduk = data;
                        buatTombolFilter();
                        tampilkanKatalog(semuaProduk);
                        setStatus(`${semuaProduk.length} produk dimuat dari cache`);
                        return;
                    }
                }
            } catch (_) {}

            try {
                const res = await fetch(SHEET_URL);
                const txt = await res.text();
                const json = JSON.parse(txt.substring(47, txt.length - 2));
                const rows = json.table.rows;

                let tempGroup = {};
                let uniqueID = 0;

                rows.forEach(row => {
                    if (!row.c[0]) return;
                    const koleksi = row.c[0] ? String(row.c[0].v) : 'Lainnya';
                    const namaRaw = row.c[1] ? String(row.c[1].v).trim() : '';
                    const ukuran  = row.c[2] ? String(row.c[2].v) : '-';
                    const harga   = row.c[3] ? row.c[3].v : 0;
                    const stok    = row.c[4] ? row.c[4].v : 0;
                    const foto    = row.c[5] ? String(row.c[5].v) : '';

                    let id;
                    if (namaRaw === '' || namaRaw === '-' || namaRaw.toLowerCase() === 'motif baru') {
                        id = `standalone-${uniqueID++}`;
                    } else {
                        id = `${koleksi}-${namaRaw}`;
                    }

                    if (!tempGroup[id]) {
                        tempGroup[id] = { koleksi, nama: namaRaw || 'Motif Baru', fotoUtama: foto, variasi: [] };
                    }

                    const fotoFinal = (foto && foto !== '' && foto !== '-') ? foto : tempGroup[id].fotoUtama;
                    tempGroup[id].variasi.push({ ukuran, harga, stok, foto: fotoFinal });
                });

                semuaProduk = Object.values(tempGroup);

                // Simpan ke cache
                try {
                    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: semuaProduk }));
                } catch (_) {}

                buatTombolFilter();
                tampilkanKatalog(semuaProduk);
                setStatus(`${semuaProduk.length} produk tersedia`);

            } catch (err) {
                document.getElementById('katalog-container').innerHTML =
                    `<p class="col-span-full py-20 text-center text-red-400 italic">Gagal memuat data. Coba refresh halaman.</p>`;
            }
        }

        function setStatus(msg) {
            const el = document.getElementById('status-text');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        // PERF: Bangun HTML via array join, bukan innerHTML += (hindari re-parse DOM berulang)
        function tampilkanKatalog(data) {
            // Reset observer lama
            if (lazyObserver) lazyObserver.disconnect();

            const container = document.getElementById('katalog-container');

            if (data.length === 0) {
                container.innerHTML = `<p class="col-span-full py-20 text-center text-gray-400 italic">Produk tidak ditemukan.</p>`;
                return;
            }

            const waIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="w-5 h-5"><path fill="#25D366" d="M4.9 43.3l2.7-9.9C5.9 30.6 5 27.4 5 24 5 13.5 13.5 5 24 5s19 8.5 19 19-8.5 19-19 19c-3.2 0-6.2-.8-8.8-2.3L4.9 43.3z"/><path fill="#fff" d="M33.7 28.3c-.4-.2-2.3-1.1-2.6-1.3-.3-.1-.6-.2-.9.2-.3.4-1 1.3-1.3 1.5-.2.3-.5.3-.9.1-.4-.2-1.7-.6-3.2-2-1.2-1-2-2.3-2.2-2.7-.2-.4 0-.6.2-.8.2-.2.4-.5.6-.7.2-.2.2-.4.3-.7.1-.2 0-.5-.1-.7-.1-.2-1-2.3-1.3-3.1-.3-.8-.7-.7-1-.7h-.8c-.3 0-.7.1-1 .5s-1.4 1.4-1.4 3.3 1.4 3.8 1.6 4.1c.2.3 2.8 4.3 6.8 6 .9.4 1.7.6 2.2.8.9.3 1.8.2 2.4.1.7-.1 2.3-.9 2.6-1.8.3-.9.3-1.6.2-1.8-.1-.2-.4-.3-.8-.5z"/></svg>`;

            const html = data.map((item, index) => {
                const cid = `c${index}`;
                const def = item.variasi[0];
                const stokClass = def.stok != '0' ? 'text-green-600' : 'text-red-500';
                const waLink = buildWaLink(item.koleksi, item.nama, def.ukuran, def.foto);

                const ukuranBtns = item.variasi.map((v, i) =>
                    `<button onclick="updVar('${cid}','${v.ukuran}','${v.harga}','${v.stok}',this,'${v.foto}')"
                             class="ukuran-btn text-[9px] px-2 py-1 rounded bg-white/90 dark:bg-zinc-800/90 font-bold border dark:border-zinc-600 dark:text-white ${i===0?'selected':''}"
                             data-ukuran="${v.ukuran}">
                        ${v.ukuran}
                    </button>`
                ).join('');

                return `
                <div class="card-item bg-white dark:bg-zinc-800 rounded-2xl overflow-hidden shadow-sm border border-gray-100 dark:border-zinc-700 flex flex-col">
                    <div class="img-wrap relative aspect-[3/4] overflow-hidden">
                        <img id="${cid}-img"
                             data-src="${def.foto}"
                             src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                             class="lazy-img w-full h-full object-cover cursor-zoom-in"
                             onclick="openZoom(this.src)"
                             loading="lazy"
                             decoding="async"
                             alt="${item.nama}"
                             onerror="this.src='https://placehold.co/400x500/e5e7eb/9ca3af?text=Foto+Error'">
                        <div class="absolute bottom-2 left-2 flex flex-wrap gap-1 pr-8">
                            ${ukuranBtns}
                        </div>
                    </div>
                    <div class="p-3 flex flex-col flex-grow text-gray-900 dark:text-gray-100">
                        <p class="text-[9px] font-black text-blue-500 uppercase tracking-tighter">${item.koleksi}</p>
                        <h3 class="text-xs font-bold mb-2 uppercase line-clamp-2 leading-tight">${item.nama}</h3>
                        <div class="mt-auto pt-2 border-t dark:border-zinc-700">
                            <p id="${cid}-h" class="text-sm font-black italic text-gray-900 dark:text-white">Rp ${formatRupiah(def.harga)}</p>
                            <div class="flex items-center justify-between mt-2">
                                <span id="${cid}-s" class="text-[9px] font-bold ${stokClass} uppercase">● STOK: ${def.stok}</span>
                                <a id="${cid}-wa" href="${waLink}" target="_blank" rel="noopener noreferrer"
                                   class="bg-white border border-gray-100 shadow-sm p-1 rounded-lg hover:scale-110 transition-transform flex items-center justify-center"
                                   aria-label="Tanya via WhatsApp">
                                    ${waIcon}
                                </a>
                            </div>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html.join('');
            initLazyLoading();
        }

        function buildWaLink(koleksi, nama, ukuran, foto) {
            const msg = encodeURIComponent(`Halo Aneka Karpet Indah, saya mau tanya karpet ${koleksi} ${nama} ukuran ${ukuran}.\nFoto: ${foto}`);
            return `https://wa.me/${WA_NUMBER}?text=${msg}`;
        }

        // PERF: Observer global, rootMargin lebih besar agar prefetch lebih awal
        function initLazyLoading() {
            lazyObserver = new IntersectionObserver((entries, obs) => {
                entries.forEach(entry => {
                    if (!entry.isIntersecting) return;
                    const img = entry.target;
                    const src = img.getAttribute('data-src');
                    if (!src) return;
                    img.src = src;
                    img.onload = () => img.classList.add('loaded');
                    img.onerror = () => { img.src = 'https://placehold.co/400x500/e5e7eb/9ca3af?text=Foto+Error'; img.classList.add('loaded'); };
                    obs.unobserve(img);
                });
            }, { rootMargin: '200px 0px' }); // PERF: Load gambar 200px sebelum masuk viewport

            document.querySelectorAll('.lazy-img').forEach(img => lazyObserver.observe(img));
        }

        function updVar(cid, u, h, s, btn, f) {
            const img = document.getElementById(`${cid}-img`);
            img.classList.remove('loaded');
            img.src = f;
            img.onload = () => img.classList.add('loaded');
            img.onerror = () => { img.src = 'https://placehold.co/400x500/e5e7eb/9ca3af?text=Foto+Error'; img.classList.add('loaded'); };

            document.getElementById(`${cid}-h`).textContent = `Rp ${formatRupiah(h)}`;

            const sel = document.getElementById(`${cid}-s`);
            sel.textContent = `● STOK: ${s}`;
            sel.className = `text-[9px] font-bold ${s != '0' ? 'text-green-600' : 'text-red-500'} uppercase`;

            // Update WA link
            const card = btn.closest('.card-item');
            const kol  = card.querySelector('p').textContent.trim();
            const nam  = card.querySelector('h3').textContent.trim();
            document.getElementById(`${cid}-wa`).href = buildWaLink(kol, nam, u, f);

            btn.parentElement.querySelectorAll('.ukuran-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function buatTombolFilter() {
            const bar = document.getElementById('filter-bar');
            const list = [...new Set(semuaProduk.map(p => p.koleksi))];

            // PERF: Build DOM fragment, bukan innerHTML loop
            const frag = document.createDocumentFragment();

            const btnSemua = document.createElement('button');
            btnSemua.textContent = 'SEMUA';
            btnSemua.className = 'filter-btn active whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 dark:border-zinc-700 text-xs font-bold transition bg-white dark:bg-zinc-800 uppercase';
            btnSemua.onclick = (e) => filterKoleksi('Semua', e.currentTarget);
            frag.appendChild(btnSemua);

            list.forEach(k => {
                const btn = document.createElement('button');
                btn.textContent = k.toUpperCase();
                btn.className = 'filter-btn whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 dark:border-zinc-700 text-xs font-bold transition bg-white dark:bg-zinc-800 uppercase';
                btn.onclick = (e) => filterKoleksi(k, e.currentTarget);
                frag.appendChild(btn);
            });

            bar.innerHTML = '';
            bar.appendChild(frag);
        }

        function filterKoleksi(kat, btn) {
            activeFilter = kat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = kat === 'Semua' ? semuaProduk : semuaProduk.filter(p => p.koleksi === kat);
            tampilkanKatalog(filtered);
        }

        function cariProduk() {
            const key = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = semuaProduk.filter(p =>
                p.nama.toLowerCase().includes(key) || p.koleksi.toLowerCase().includes(key)
            );
            tampilkanKatalog(filtered);
            setStatus(key ? `${filtered.length} produk ditemukan untuk "${key}"` : `${semuaProduk.length} produk tersedia`);
        }

        function openZoom(s) {
            const modal = document.getElementById('modal-zoom');
            document.getElementById('img-zoom').src = s;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Cegah scroll saat modal terbuka
        }

        function closeZoom() {
            document.getElementById('modal-zoom').style.display = 'none';
            document.body.style.overflow = '';
        }

        // Tutup modal dengan tombol Escape
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeZoom(); });

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }

        // Apply saved theme sebelum render agar tidak flicker
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        // PERF: Jalankan setelah browser selesai parse HTML
        ambilData();
    </script>
</body>
</html>
